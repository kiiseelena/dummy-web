stages:
  - build
  - deploy_dev
  - deploy_staging
  - deploy_prod

variables:
  DOCKER_REGISTRY: "registry.example.com"
  BACKEND_IMAGE: "$DOCKER_REGISTRY/$CI_PROJECT_NAME/backend"
  FRONTEND_IMAGE: "$DOCKER_REGISTRY/$CI_PROJECT_NAME/frontend"

# -- Build Stage --
build_backend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -t $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA ./backend
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - develop

build_frontend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -t $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA ./frontend
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - develop

# -- Deploy Stages (Dummy Docker Compose Steps) --
deploy_dev:
  stage: deploy_dev
  script:
    - echo "Deploying to Development Environment"
    - cd deployment
    - echo "TAG=$CI_COMMIT_SHORT_SHA" >> .env
    - docker-compose up -d
  environment:
    name: development
  only:
    - develop

deploy_staging:
  stage: deploy_staging
  script:
    - echo "Deploying to Staging Environment"
    - cd deployment
    - echo "TAG=$CI_COMMIT_SHORT_SHA" >> .env
    - docker-compose up -d
  environment:
    name: staging
  only:
    - main

deploy_prod:
  stage: deploy_prod
  script:
    - echo "Deploying to Production Environment"
    - cd deployment
    - echo "TAG=$CI_COMMIT_SHORT_SHA" >> .env
    - docker-compose up -d
  environment:
    name: production
  when: manual
  only:
    - main
